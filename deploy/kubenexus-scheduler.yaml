---
apiVersion: v1
kind: Namespace
metadata:
  name: kubenexus-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubenexus-scheduler
  namespace: kubenexus-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubenexus-scheduler
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch", "update", "patch"]
- apiGroups: [""]
  resources: ["pods/status"]
  verbs: ["patch", "update"]
- apiGroups: [""]
  resources: ["pods/binding"]
  verbs: ["create"]
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["persistentvolumes", "persistentvolumeclaims"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["configmaps", "services", "namespaces", "replicationcontrollers"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["replicasets", "statefulsets"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["storage.k8s.io"]
  resources: ["storageclasses", "csinodes", "csidrivers", "csistoragecapacities", "volumeattachments"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["policy"]
  resources: ["poddisruptionbudgets"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["resource.k8s.io"]
  resources: ["resourceclaims", "deviceclasses", "resourceslices"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["resource.k8s.io"]
  resources: ["resourceclaims", "resourceclaims/status"]
  verbs: ["update", "patch"]
- apiGroups: ["resource.k8s.io"]
  resources: ["podschedulingcontexts"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["resource.k8s.io"]
  resources: ["podschedulingcontexts/status"]
  verbs: ["update", "patch"]
- apiGroups: [""]
  resources: ["events"]
  verbs: ["create", "patch", "update"]
- apiGroups: ["events.k8s.io"]
  resources: ["events"]
  verbs: ["create", "patch", "update"]
- apiGroups: ["coordination.k8s.io"]
  resources: ["leases"]
  verbs: ["create", "get", "update"]
- apiGroups: ["sparkscheduler.palantir.com"]
  resources: ["resourcereservations"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["scheduling.kubenexus.io"]
  resources: ["resourcereservations"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["scheduling.kubenexus.io"]
  resources: ["resourcereservations/status"]
  verbs: ["update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubenexus-scheduler
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kubenexus-scheduler
subjects:
- kind: ServiceAccount
  name: kubenexus-scheduler
  namespace: kubenexus-system
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kubenexus-config
  namespace: kubenexus-system
data:
  config.yaml: |
    apiVersion: kubescheduler.config.k8s.io/v1
    kind: KubeSchedulerConfiguration
    leaderElection:
      leaderElect: true
      resourceName: kubenexus-scheduler
      resourceNamespace: kubenexus-system
    clientConnection:
      kubeconfig: ""
    profiles:
    - schedulerName: kubenexus-scheduler
      plugins:
        queueSort:
          enabled:
          - name: Coscheduling
          disabled:
          - name: "*"
        preFilter:
          enabled:
          - name: ProfileClassifier
          - name: Coscheduling
        filter:
          enabled:
          - name: NetworkFabricScore
          - name: VRAMScheduler
          - name: NUMATopology
        score:
          enabled:
          - name: WorkloadAwareScoring
          - name: TopologyScoring
          - name: BackfillScoring
          - name: ResourceFragmentationScore
          - name: TenantHardwareAffinityScore
          - name: VRAMScheduler
          - name: NetworkFabricScore
          - name: NUMATopology
        permit:
          enabled:
          - name: Coscheduling
        reserve:
          enabled:
          - name: Coscheduling
        postFilter:
          enabled:
          - name: GangPreemption
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubenexus-scheduler
  namespace: kubenexus-system
  labels:
    app: kubenexus-scheduler
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kubenexus-scheduler
  template:
    metadata:
      labels:
        app: kubenexus-scheduler
    spec:
      serviceAccountName: kubenexus-scheduler
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: scheduler
        image: kubenexus-scheduler:latest
        imagePullPolicy: IfNotPresent
        command:
          - /kubenexus-scheduler
          - --config=/etc/kubenexus/config.yaml
          - --v=4
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        volumeMounts:
        - name: config
          mountPath: /etc/kubenexus
          readOnly: true
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /healthz
            port: 10259
            scheme: HTTPS
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /healthz
            port: 10259
            scheme: HTTPS
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: config
        configMap:
          name: kubenexus-config
---
apiVersion: v1
kind: Service
metadata:
  name: kubenexus-scheduler
  namespace: kubenexus-system
  labels:
    app: kubenexus-scheduler
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "10251"
    prometheus.io/path: "/metrics"
spec:
  selector:
    app: kubenexus-scheduler
  ports:
  - name: metrics
    port: 10251
    protocol: TCP
    targetPort: 10251
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: kubenexus-scheduler
  namespace: kubenexus-system
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: kubenexus-scheduler
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: kubenexus-scheduler
  namespace: kubenexus-system
  labels:
    app: kubenexus-scheduler
spec:
  selector:
    matchLabels:
      app: kubenexus-scheduler
  endpoints:
  - port: metrics
    interval: 30s
    path: /metrics
