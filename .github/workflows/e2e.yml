name: E2E Tests

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  schedule:
    # Run nightly at 3 AM UTC
    - cron: '0 3 * * *'
  workflow_dispatch: # Allow manual triggering

jobs:
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'
        cache: true
        cache-dependency-path: go.sum
    
    - name: Install Kind
      run: |
        go install sigs.k8s.io/kind@latest
        kind version
    
    - name: Install kubectl
      run: |
        curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
        chmod +x kubectl
        sudo mv kubectl /usr/local/bin/
        kubectl version --client
    
    - name: Install Helm
      uses: azure/setup-helm@v4
      with:
        version: 'latest'
    
    - name: Download dependencies
      run: go mod download
    
    - name: Set up E2E infrastructure
      run: ./hack/e2e-setup.sh
      env:
        CLUSTER_NAME: kubenexus-e2e
    
    - name: Run E2E tests
      run: make test-e2e
      timeout-minutes: 15
    
    - name: Collect scheduler logs
      if: always()
      run: |
        kubectl logs -n kubenexus-system -l app=kubenexus-scheduler --tail=200 > e2e-scheduler.log 2>&1 || true
        kubectl get pods -A -o wide > e2e-pods.log 2>&1 || true
        kubectl get nodes -o wide > e2e-nodes.log 2>&1 || true
    
    - name: Teardown cluster
      if: always()
      run: ./hack/e2e-setup.sh teardown
    
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: e2e-test-results
        path: |
          e2e-*.log
        retention-days: 7
