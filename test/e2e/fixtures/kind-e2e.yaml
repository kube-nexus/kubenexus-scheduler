# Kind cluster for e2e testing with KWOK fake GPU nodes.
# Control-plane only — KWOK manages fake worker nodes.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: kubenexus-e2e
featureGates:
  "DynamicResourceAllocation": true
nodes:
- role: control-plane
  image: kindest/node:v1.35.1
  kubeadmConfigPatches:
  - |
    kind: ClusterConfiguration
    apiServer:
      extraArgs:
        feature-gates: "DynamicResourceAllocation=true"
        runtime-config: "resource.k8s.io/v1=true"
    controllerManager:
      extraArgs:
        feature-gates: "DynamicResourceAllocation=true"
    scheduler:
      extraArgs:
        feature-gates: "DynamicResourceAllocation=true"
  - |
    kind: InitConfiguration
    nodeRegistration:
      kubeletExtraArgs:
        feature-gates: "DynamicResourceAllocation=true"
